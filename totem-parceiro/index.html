<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Totem Parceiro | Parque das Águas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0c1821;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;color:#fff;overflow-x:hidden}

.header{text-align:center;padding:24px 20px 12px;width:100%;max-width:700px}
.logo{width:100px;height:auto;margin-bottom:6px}
.header h1{font-size:22px;font-weight:800;letter-spacing:1px}
.header .sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.badge{display:inline-block;margin-top:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:4px 16px;border-radius:30px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.sync{margin-top:6px;font-size:10px;font-weight:600}
.sd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.tabs{display:flex;margin-top:14px;width:100%;max-width:560px;padding:0 20px}
.tb{flex:1;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.3s}
.tb:first-child{border-radius:10px 0 0 10px}
.tb:last-child{border-radius:0 10px 10px 0}
.tb.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#fff}

.wrap{width:100%;max-width:560px;padding:0 20px;margin-top:14px;flex:1}

/* === CAMERA === */
.cam-area{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:4/3}
.cam-area video{width:100%;height:100%;object-fit:cover;display:block}
.cam-area canvas{display:none}
.frame{position:absolute;top:50%;left:50%;width:220px;height:220px;margin:-110px 0 0 -110px;border:2px solid rgba(34,211,238,.5);border-radius:12px;z-index:2;pointer-events:none}
.line{position:absolute;left:50%;width:200px;margin-left:-100px;height:3px;background:linear-gradient(90deg,transparent,#22d3ee,transparent);top:35%;z-index:3;animation:sc 2s ease-in-out infinite;pointer-events:none}
@keyframes sc{0%,100%{top:35%}50%{top:62%}}
.cam-label{text-align:center;font-size:12px;color:rgba(255,255,255,.35);padding:8px 0;font-weight:600}
.cam-status{text-align:center;font-size:11px;color:rgba(255,255,255,.25);padding:4px 0}

/* === OVERLAY RESULTADO === */
.ov{position:absolute;inset:0;z-index:20;display:none;border-radius:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ov.show{display:flex;align-items:center;justify-content:center;animation:fi .3s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.ov.bg-ok{background:rgba(5,46,22,.97)}
.ov.bg-ng{background:rgba(50,10,10,.97)}
.ov.bg-warn{background:rgba(50,30,5,.97)}
.ov-inner{padding:28px 18px;text-align:center;width:100%}

.si{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:36px}
.si.ok{background:#00c853;box-shadow:0 0 40px rgba(0,200,83,.3)}
.si.ng{background:#e53e3e;box-shadow:0 0 40px rgba(229,62,62,.3)}
.si.warn{background:#dd6b20;box-shadow:0 0 40px rgba(221,107,32,.3)}
.st{font-size:19px;font-weight:800;text-transform:uppercase;letter-spacing:2px}
.st.ok{color:#00e676}.st.ng{color:#fc5c65}.st.warn{color:#f6ad55}
.mn{font-size:18px;font-weight:700;color:#fff;margin-top:10px}
.ab{display:inline-block;margin-top:12px;background:#fff;color:#000;padding:5px 18px;border-radius:30px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.dl{margin-top:12px;display:flex;flex-direction:column;gap:4px;text-align:left;max-width:360px;margin-left:auto;margin-right:auto}
.dr{display:flex;justify-content:space-between;padding:7px 10px;background:rgba(255,255,255,.06);border-radius:7px;font-size:12px}
.dr .k{color:rgba(255,255,255,.45);font-weight:600}
.dr .v{color:#fff;font-weight:500}

.bn{display:inline-block;margin-top:18px;padding:14px 40px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.bn:active{transform:scale(.96);background:rgba(255,255,255,.15)}

/* === BUSCA === */
.search-area{display:none}
.sbox{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px}
.sbox label{display:block;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px;font-weight:600}
.sbox .iw{display:flex;gap:8px}
.sbox input{flex:1;padding:14px 16px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.06);color:#fff;font-size:16px;outline:none}
.sbox input::placeholder{color:rgba(255,255,255,.18);font-size:14px}
.sbox input:focus{border-color:rgba(255,255,255,.25)}
.sbtn{padding:14px 22px;background:#fff;border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.shint{font-size:10px;color:rgba(255,255,255,.12);margin-top:6px;text-align:center}
.sres{margin-top:12px}
.sc{padding:24px 16px;border-radius:14px;text-align:center;margin-top:10px;animation:fi .3s}
.sc.sv{background:rgba(0,200,83,.06);border:2px solid rgba(0,200,100,.3)}
.sc.sb{background:rgba(221,107,32,.06);border:2px solid rgba(255,165,0,.3)}
.sc.sn{background:rgba(229,62,62,.06);border:2px solid rgba(255,80,80,.2)}
.ri{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;background:rgba(255,255,255,.05);border-radius:8px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;transition:.2s}
.ri:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
.ri .rn{font-weight:600;font-size:13px}
.ba{background:rgba(0,200,100,.15);color:#00e676;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.br{background:rgba(255,165,0,.15);color:#f6ad55;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.idle{text-align:center;padding:24px;color:rgba(255,255,255,.12);margin-top:14px;font-size:12px}

.footer{padding:18px;text-align:center;font-size:9px;color:rgba(255,255,255,.07);margin-top:auto}

@media(max-width:500px){
.header h1{font-size:19px}
.logo{width:80px}
.sbox .iw{flex-direction:column}
.sbtn{padding:13px}
.cam-area{aspect-ratio:3/3.2}
}
</style>
</head>
<body>

<div class="header">
    <img src="https://parquedasaguasmt-alt.github.io/AQCUACARD/logo-parque.png" alt="Parque das Águas" class="logo" id="logoImg">
    <h1>PARQUE DAS ÁGUAS</h1>
    <div class="sub">AQUACARD — Validação de Carteirinha</div>
    <div class="badge">Totem Parceiro</div>
    <div class="sync">
        <span class="sd" id="sDot" style="background:#f6e05e"></span>
        <span id="sTxt" style="color:rgba(255,255,255,.3)">Conectando...</span>
    </div>
</div>

<div class="tabs">
    <div class="tb on" id="t1" onclick="switchTab('qr')">📷 QR Code</div>
    <div class="tb" id="t2" onclick="switchTab('search')">🔍 Nome / CPF</div>
</div>

<div class="wrap">

    <!-- TAB QR -->
    <div id="qrTab">
        <div class="cam-label">Aponte a câmera para o QR Code da carteirinha</div>
        <div class="cam-area" id="camArea">
            <video id="vid" playsinline autoplay muted></video>
            <canvas id="cvs"></canvas>
            <div class="frame"></div>
            <div class="line"></div>
            <div class="ov" id="ov"><div class="ov-inner" id="ovIn"></div></div>
        </div>
        <div class="cam-status" id="camSt">Iniciando câmera...</div>
    </div>

    <!-- TAB BUSCA -->
    <div class="search-area" id="searchTab">
        <div class="sbox">
            <label>Validar Carteirinha Digital</label>
            <div class="iw">
                <input type="text" id="sInput" placeholder="Nome ou CPF..." autocomplete="off"/>
                <button class="sbtn" onclick="buscar()">Validar</button>
            </div>
            <div class="shint">Pressione ENTER ou clique em Validar</div>
        </div>
        <div class="sres" id="sRes"></div>
        <div class="idle" id="sIdle">💳 Busque pelo nome ou CPF para validar</div>
    </div>

</div>

<div class="footer">Parque das Águas — AquaCard &copy; 2026 — Totem Parceiro</div>

<script>
(function(){
/* ===== CONFIG ===== */
var FB='https://aqcuacard-default-rtdb.firebaseio.com';
var assoc=[], online=false;

document.getElementById('logoImg').onerror=function(){this.style.display='none'};

/* ===== FIREBASE ===== */
function loadDB(){
    var x=new XMLHttpRequest();
    x.open('GET',FB+'/associados.json',true);
    x.timeout=10000;
    x.onload=function(){
        if(x.status===200){try{var d=JSON.parse(x.responseText);assoc=[];if(d){for(var k in d){var a=d[k];a._k=k;assoc.push(a)}}online=true}catch(e){online=false}}else{online=false}
        syncUI();
    };
    x.onerror=x.ontimeout=function(){online=false;syncUI()};
    x.send();
}
function syncUI(){
    var d=document.getElementById('sDot'),t=document.getElementById('sTxt');
    if(online){d.style.background='#68d391';t.textContent='Base sincronizada';t.style.color='#68d391'}
    else{d.style.background='#fc8181';t.textContent='Offline';t.style.color='#fc8181'}
}
setInterval(loadDB,15000);

/* ===== UTILS ===== */
function N(s){return(s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9 ]/g,'').trim()}
function NC(c){return(c||'').replace(/\D/g,'')}
function MC(c){var l=NC(c);if(l.length!==11)return c||'—';return'***.'+l.substr(3,3)+'.'+l.substr(6,3)+'-**'}
function TS(){var n=new Date();return n.toLocaleDateString('pt-BR')+' às '+n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}

function find(val){
    if(val.indexOf('ACQUACARD|')===0){
        var p=val.split('|'),id=p[1]||'',nm=p[2]||'';
        for(var i=0;i<assoc.length;i++){if(assoc[i].id===id)return assoc[i]}
        if(nm){var nn=N(nm);for(var i=0;i<assoc.length;i++){if(N(assoc[i].nome)===nn)return assoc[i]}}
        return null;
    }
    var cb=NC(val);
    if(/^\d{11}$/.test(cb)){for(var i=0;i<assoc.length;i++){if(NC(assoc[i].cpf)===cb)return assoc[i]}}
    var nm=N(val);
    for(var i=0;i<assoc.length;i++){if(N(assoc[i].nome)===nm)return assoc[i]}
    return null;
}

/* ===== CAMERA COM getUserMedia + jsQR ===== */
var video=document.getElementById('vid');
var canvas=document.getElementById('cvs');
var ctx=canvas.getContext('2d',{willReadFrequently:true});
var stream=null;
var scanTimer=null;
var blocked=false;
var COOLDOWN=2500;

function startCam(){
    navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}
    }).then(function(s){
        stream=s;
        video.srcObject=s;
        video.play();
        document.getElementById('camSt').textContent='📷 Câmera ativa — aponte para o QR Code';
        loadJsQR(function(){ startScan(); });
    }).catch(function(){
        document.getElementById('camSt').innerHTML='⚠️ Câmera indisponível. Use a busca.';
    });
}

function loadJsQR(cb){
    if(typeof jsQR!=='undefined')return cb();
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
    s.onload=cb;
    document.head.appendChild(s);
}

/* Scan com setInterval — mais estável que requestAnimationFrame */
function startScan(){
    stopScan();
    scanTimer=setInterval(function(){
        if(blocked)return;
        if(video.readyState<video.HAVE_ENOUGH_DATA)return;
        canvas.width=video.videoWidth;
        canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0);
        try{
            var img=ctx.getImageData(0,0,canvas.width,canvas.height);
            var code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
            if(code&&code.data&&code.data.length>3){
                blocked=true;
                processQR(code.data);
            }
        }catch(e){}
    },250);
}

function stopScan(){
    if(scanTimer){clearInterval(scanTimer);scanTimer=null}
}

function processQR(txt){
    var a=find(txt);
    if(a){showOv(a)}else{showOvNF(txt)}
}

/* ===== OVERLAY ===== */
var ov=document.getElementById('ov');
var ovIn=document.getElementById('ovIn');

function showOv(a){
    var dtc=TS();
    ov.className='ov';
    if(a.status==='Acesso Restrito'){
        ov.classList.add('show','bg-warn');
        ovIn.innerHTML=
            '<div class="si warn">⚠</div>'+
            '<div class="st warn">Acesso Restrito</div>'+
            '<div class="mn">'+a.nome+'</div>'+
            '<div style="margin-top:10px;font-size:13px;color:rgba(255,255,255,.4)">Carteirinha com restrição.<br>Procure a administração.</div>'+
            '<div class="bn" onclick="fecharOv()">🔄 Nova Consulta</div>';
    }else{
        ov.classList.add('show','bg-ok');
        ovIn.innerHTML=
            '<div class="si ok">✓</div>'+
            '<div class="st ok">Carteirinha Válida</div>'+
            '<div class="mn">'+a.nome+'</div>'+
            '<div class="ab">AQUACARD ATIVO</div>'+
            '<div class="dl">'+
                '<div class="dr"><span class="k">Status</span><span class="v" style="color:#00e676;font-weight:700">'+a.status+'</span></div>'+
                '<div class="dr"><span class="k">CPF</span><span class="v">'+MC(a.cpf)+'</span></div>'+
                (a.emp?'<div class="dr"><span class="k">Empresa</span><span class="v">'+a.emp+'</span></div>':'')+
                (a.titulo?'<div class="dr"><span class="k">Título</span><span class="v">'+a.titulo+'</span></div>':'')+
                (a.fim?'<div class="dr"><span class="k">Validade</span><span class="v">'+a.fim+'</span></div>':'')+
                '<div class="dr"><span class="k">Validação</span><span class="v">'+dtc+'</span></div>'+
            '</div>'+
            '<div class="bn" onclick="fecharOv()">🔄 Nova Consulta</div>';
    }
}

function showOvNF(txt){
    ov.className='ov show bg-ng';
    ovIn.innerHTML=
        '<div class="si ng">✕</div>'+
        '<div class="st ng">Não Encontrado</div>'+
        '<div style="font-size:12px;color:rgba(255,255,255,.25);margin-top:8px">Carteirinha não identificada.</div>'+
        '<div style="font-size:10px;color:rgba(255,255,255,.12);margin-top:4px;word-break:break-all">'+txt.substring(0,80)+'</div>'+
        '<div class="bn" onclick="fecharOv()">🔄 Nova Consulta</div>';
}

/* Fechar overlay e liberar scan */
window.fecharOv=function(){
    ov.className='ov';
    ovIn.innerHTML='';
    document.getElementById('camSt').textContent='📷 Câmera ativa — aponte para o QR Code';
    /* Cooldown para não ler o mesmo QR instantaneamente */
    setTimeout(function(){ blocked=false; },COOLDOWN);
};

/* ===== TABS ===== */
window.switchTab=function(tab){
    document.getElementById('t1').classList.toggle('on',tab==='qr');
    document.getElementById('t2').classList.toggle('on',tab==='search');
    document.getElementById('qrTab').style.display=tab==='qr'?'block':'none';
    document.getElementById('searchTab').style.display=tab==='search'?'block':'none';
    if(tab==='qr'){
        fecharOv();
        if(!scanTimer)startScan();
    }else{
        document.getElementById('sInput').focus();
        document.getElementById('sRes').innerHTML='';
        document.getElementById('sIdle').style.display='block';
    }
};

/* ===== BUSCA ===== */
window.buscar=function(){
    var v=document.getElementById('sInput').value.trim();
    if(!v)return;
    document.getElementById('sIdle').style.display='none';
    var area=document.getElementById('sRes');
    var dtc=TS();
    var a=find(v);
    if(a){sCard(a,dtc);return}
    var b=N(v),bc=NC(v),isD=/^\d+$/.test(bc)&&bc.length>=3,r=[];
    if(isD){r=assoc.filter(function(x){return x.cpf&&NC(x.cpf).indexOf(bc)>=0})}
    if(!r.length){r=assoc.filter(function(x){return N(x.nome).indexOf(b)>=0})}
    if(r.length===1){sCard(r[0],dtc);return}
    if(r.length>1){
        area.innerHTML=r.slice(0,15).map(function(x){
            var c=x.status==='Ativo'?'ba':'br',t=x.status==='Ativo'?'Ativo':'Restrito';
            return'<div class="ri" onclick="selS(\''+x.id+'\')"><div class="rn">'+x.nome+'</div><div class="'+c+'">'+t+'</div></div>';
        }).join('');
        return;
    }
    area.innerHTML='<div class="sc sn"><div class="si ng">✕</div><div class="st ng">Não Encontrado</div><div style="font-size:12px;color:rgba(255,255,255,.25);margin-top:6px">Nenhum associado encontrado.</div><div class="bn" onclick="limS()">🔄 Nova Consulta</div></div>';
};

window.selS=function(id){
    for(var i=0;i<assoc.length;i++){if(assoc[i].id===id){sCard(assoc[i],TS());return}}
};

function sCard(a,dtc){
    var area=document.getElementById('sRes');
    if(a.status==='Acesso Restrito'){
        area.innerHTML='<div class="sc sb"><div class="si warn">⚠</div><div class="st warn">Acesso Restrito</div><div class="mn">'+a.nome+'</div><div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,.4)">Procure a administração.</div><div class="bn" onclick="limS()">🔄 Nova Consulta</div></div>';
    }else{
        area.innerHTML='<div class="sc sv"><div class="si ok">✓</div><div class="st ok">Carteirinha Válida</div><div class="mn">'+a.nome+'</div><div class="ab">AQUACARD ATIVO</div><div class="dl">'+
            '<div class="dr"><span class="k">Status</span><span class="v" style="color:#00e676;font-weight:700">'+a.status+'</span></div>'+
            '<div class="dr"><span class="k">CPF</span><span class="v">'+MC(a.cpf)+'</span></div>'+
            (a.emp?'<div class="dr"><span class="k">Empresa</span><span class="v">'+a.emp+'</span></div>':'')+
            (a.titulo?'<div class="dr"><span class="k">Título</span><span class="v">'+a.titulo+'</span></div>':'')+
            (a.fim?'<div class="dr"><span class="k">Validade</span><span class="v">'+a.fim+'</span></div>':'')+
            '<div class="dr"><span class="k">Validação</span><span class="v">'+dtc+'</span></div>'+
            '</div><div class="bn" onclick="limS()">🔄 Nova Consulta</div></div>';
    }
}

window.limS=function(){
    document.getElementById('sInput').value='';
    document.getElementById('sRes').innerHTML='';
    document.getElementById('sIdle').style.display='block';
    document.getElementById('sInput').focus();
};

document.getElementById('sInput').addEventListener('keydown',function(e){if(e.key==='Enter')buscar()});

/* ===== INIT ===== */
loadDB();
startCam();

})();
</script>
</body>
</html>
